  "Domena: SaldeoSMART (BrainSHARE IT, Visma Group) — księgowość SaaS dla biur rachunkowych, SMB i micro/JDG (PL/CEE).",
  "6 revenue engines: SaaS, EOD (OCR), Kadry/HR, integracje bankowe, Embedded Finance, SMARTduet (PLG).",
  "AI layer: feature 'Uzupełnij z AI' + 7 in-product agentów A1–A7 (Document Intelligence, Workflow Orchestrator, Bank Reconciliation, Compliance Guard, Cash Flow Forecasting, Payment/Factoring, HR/Delegacje).",
  "Compliance baseline (zawsze sprawdzaj): KSeF (2026–2027), RODO/GDPR, JPK, Biała Lista, VIES, EU AI Act, WCAG 2.1 AA, i18n PL/EN/CS/RO/SK.",
  "Value pillars: Time-to-Close · Automation Yield · Compliance Confidence — każdy artefakt mapowany na min. jeden filar.",
