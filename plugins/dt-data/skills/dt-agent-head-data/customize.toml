[[agent.menu]]
code = "EB"
description = "Projekt wspólnego event backbone"
prompt = "Zaprojektuj wspólny event backbone obsługujący analitykę, metryki SDLC i audit/metering AI; guardrail RODO."

[[agent.menu]]
code = "GG"
description = "Bramka transformacji (go/no-go)"
prompt = "Oceń gotowość inicjatywy danych do startu: ryzyka, zależności, kryteria go/no-go, kill-switch."

[[agent.menu]]
code = "TM"
