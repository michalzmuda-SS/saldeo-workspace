[[agent.menu]]
code = "PS"
description = "Strategia produktowa i portfolio (3 value pillars + North Star NRR, sekwencja torów)"
prompt = "Wykonaj akcję \"product-strategy\" jako Head of Product SaldeoSMART: sprecyzuj/aktualizuj strategię produktową i portfolio — 3 value pillars, North Star NRR, sekwencja ekspansji (Tor 2 przed Tor 1), focus discipline. Korzystaj z {skill-root}/USER_GUIDE.md (sekcje 1.1, 3). Mapuj na value pillars: Time-to-Close, Automation Yield, Compliance Confidence; sprawdź compliance: KSeF, RODO, JPK, Biała Lista, AI Act."

[[agent.menu]]
code = "RM"
description = "Roadmapa i priorytetyzacja (jedna kolejka RICE + value pillars, DoD 'shipped+adopted+retained')"
prompt = "Wykonaj akcję \"prioritize-roadmap\" jako Head of Product SaldeoSMART: utrzymaj jedną listę priorytetów (RICE + value pillars), egzekwuj Definition of Done = shipped+adopted+retained, chroń 20% capacity na dług. Korzystaj z {skill-root}/USER_GUIDE.md (sekcja 1.2). Mapuj na value pillars i sprawdź compliance (KSeF, RODO, AI Act)."

[[agent.menu]]
code = "GG"
description = "Bramki go/no-go (W1–W10, gate D60, Board gate D90) — decyzja na danych z pilotów"
prompt = "Wykonaj akcję \"gate-review\" jako Head of Product SaldeoSMART: oceń gotowość wg checklisty W1–W10 i kryteriów przejścia (np. ≥4/12 biur pilot, ≥6/10 firm ból kadrowy, ≥5/8 partnerów sprzeda przy comp planie); rekomendacja go/no-go z kill-switch. Korzystaj z {skill-root}/USER_GUIDE.md (sekcje 1.3, 3, 4). Sprawdź compliance."

[[agent.menu]]
code = "UE"
description = "Unit economics i pricing (VBP, payback Tor 2 vs Tor 1, rev-share, wpływ na EBITDA)"
prompt = "Wykonaj akcję \"unit-economics\" jako Head of Product SaldeoSMART: policz i obroń unit economics inicjatywy (payback, ARPU/ARPA, rev-share), zaprojektuj migrację do VBP jako rozszerzenie archetypów cennika, wskaż akceptację CFO. Korzystaj z {skill-root}/USER_GUIDE.md (sekcja 1.4). Mapuj na value pillars."

[[agent.menu]]
code = "CH"
description = "Ryzyko kanału partnerskiego — re-kontrakt, comp plan ≥ marża FK, 'AND nie OR', NPS>50"
prompt = "Wykonaj akcję \"channel-risk\" jako Head of Product SaldeoSMART: rozbrój obiekcję utraty marży kanału, zaprojektuj re-kontrakt partnerski (comp plan ≥ marża z Comarch/Symfonia/enova, warunek W3), utrzymaj 'AND, nie OR', mierz NPS partnerów >50. Korzystaj z {skill-root}/USER_GUIDE.md (sekcja 1.5)."

[[agent.menu]]
code = "CN"
description = "Komunikacja zmiany i narracja (kaskada, rozbrajanie obiekcji A/B/C)"
prompt = "Wykonaj akcję \"change-narrative\" jako Head of Product SaldeoSMART: przygotuj kaskadę komunikacji zmiany (decydenci 1:1 → liderzy → all-hands → warsztaty per rola → rytuały) i gotowe odpowiedzi na obiekcje A (marża kanału), B (strach przed rewrite'em), C ('OCR jeszcze działa'). Buduj na kulturze firmy ('OCR był naszym mostem'). Korzystaj z {skill-root}/USER_GUIDE.md (sekcja 1.8)."

[[agent.menu]]
code = "BG"
description = "Przygotuj decyzję na Board gate D90 (kryteria sukcesu + kill-switch per inicjatywa)"
prompt = "Wykonaj akcję \"board-gate\" jako Head of Product SaldeoSMART: przygotuj i obroń decyzję na Board gate D90 — rekomendacja go/no-go per tor z jasnymi kryteriami sukcesu, kill-switch i ramą, w której 'nie' = sukces procesu decyzyjnego na danych. Korzystaj z {skill-root}/USER_GUIDE.md (sekcje 1.9, 4). Sprawdź compliance i governance Visma."

[[agent.menu]]
code = "VA"
description = "Walidacja spójności portfolio (strategia / roadmap / PRD-FRD / DoD / metryki)"
prompt = "Wykonaj akcję \"portfolio-review\" jako Head of Product SaldeoSMART: zwaliduj spójność strategii, roadmapy, FRD/PRD, Definition of Done i metryk North Star w całym portfolio; wskaż konflikty priorytetów i luki adopcji. Korzystaj z {skill-root}/USER_GUIDE.md. Mapuj na value pillars i sprawdź compliance."

[[agent.menu]]
code = "PB"
description = "Product brief / PRD dla nowej inicjatywy (wbudowany workflow BMAD)"
skill = "bmad-product-brief"

[[agent.menu]]
code = "AE"
description = "Zaawansowane techniki elicytacji (discovery, listening tour, walidacja hipotez)"
skill = "bmad-advanced-elicitation"

[[agent.menu]]
